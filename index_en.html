<script id="vfs-bundled" type="application/json">{"Core/__init__.py": "# Core package\n", "Core/calc_engine_v5.py": "import sys\r\nimport os\r\nimport json\r\nimport re\r\nimport itertools\r\nimport random\r\nfrom Core.models_v5 import Modifier, ModifierType, StatType, EquipmentPiece, EquipmentSet, Journey, Character\r\nfrom Core.data_loader_v5 import load_equipments_from_json, load_journeys_from_json, load_blessings_from_json, extract_json_from_md\r\nfrom Core.gear_sensitivity_v5 import profile_stat_scaling\r\n\r\n\r\nif sys.stdout.encoding != 'utf-8':\r\n    try:\r\n        sys.stdout.reconfigure(encoding='utf-8')\r\n    except:\r\n        pass\r\n\r\ndef get_interactive_substats():\r\n    if not sys.stdin.isatty():\r\n        return {\"$ATK$\": 0.0, \"$SPD$\": 0.0, \"$CR$\": 0.0, \"$CD$\": 0.0}\r\n\r\n    print(\"\\n\" + \"=\"*50)\r\n    print(\" [Star Savior] 장비 부옵션 설정\")\r\n    print(\" - 직접 입력하려면 숫자를 입력하고, 기본값을 쓰려면 Enter를 누르세요.\")\r\n    print(\"=\"*50)\r\n    def ask(msg, default):\r\n        val = input(f\" {msg} (기본 {default}): \").strip()\r\n        return float(val) if val else default\r\n    \r\n    return {\r\n        \"$ATK$\": ask(\"공격력% 부옵 (예: 0.051)\", 0.051),\r\n        \"$SPD$\": ask(\"속도 부옵    (예: 4.0)\", 4.0),\r\n        \"$CR$\":  ask(\"치명타확률 부옵 (예: 0.033)\", 0.033),\r\n        \"$CD$\":  ask(\"치명타피해 부옵 (예: 0.066)\", 0.066),\r\n        \"METRIC\": ask(\"최적화 기준 (1: DPS, 2: 총 데미지)\", 2)\r\n    }\r\n\r\ndef get_vfs_path(rel_path):\r\n    import os\r\n    # Try root and /home/pyodide/\r\n    candidates = [rel_path, os.path.join(\"/home/pyodide\", rel_path), os.path.join(os.getcwd(), rel_path)]\r\n    for p in candidates:\r\n        if os.path.exists(p):\r\n            return p\r\n    return rel_path\r\n\r\ndef setup_equipments(substat_vars=None):\r\n    vars_only = {k:v for k,v in substat_vars.items() if k.startswith(\"$\")} if substat_vars else None\r\n    path = get_vfs_path(\"Data/equipments.json\")\r\n    try:\r\n        registry = load_equipments_from_json(path, vars_only)\r\n        if not registry: print(f\"Warning: No equipments loaded from {path}\")\r\n        return registry\r\n    except Exception as e:\r\n        print(f\"CRITICAL: Failed to load Equipments from {path}: {e}\")\r\n        return {\r\n            \"공격4세트\": EquipmentSet(\"공격4세트\", {\"weapon\": EquipmentPiece(\"weapon\", \"weapon\", [Modifier(StatType.ATK, 0.20, ModifierType.PERCENT)])}),\r\n            \"속도4세트\": EquipmentSet(\"속도4세트\", {\"weapon\": EquipmentPiece(\"weapon\", \"weapon\", [Modifier(StatType.SPEED, 15, ModifierType.FLAT)])}),\r\n        }\r\n\r\ndef setup_journeys():\r\n    path = get_vfs_path(\"Data/equipments.json\")\r\n    try:\r\n        from Core.data_loader_v5 import load_journeys_from_json\r\n        data = load_journeys_from_json(path)\r\n        if not data: print(f\"Warning: Journey data is empty at {path}\")\r\n        return data\r\n    except Exception as e:\r\n        print(f\"CRITICAL: Failed to load Journeys from {path}: {e}\")\r\n        return {\r\n            \"Error\": Journey(\"Error\", [], \"NONE\", {}),\r\n        }\r\n\r\nEQUIPMENTS = {} \r\nJOURNEYS = setup_journeys()\r\nBLESSINGS = {} # Populated in main or setup\r\n\r\ndef setup_blessings():\r\n    path = get_vfs_path(\"Data/equipments.json\")\r\n    try:\r\n        from Core.data_loader_v5 import load_blessings_from_json\r\n        data = load_blessings_from_json(path)\r\n        if not data: print(f\"Warning: Blessing data is empty at {path}\")\r\n        return data\r\n    except Exception as e:\r\n        print(f\"CRITICAL: Failed to load Blessings from {path}: {e}\")\r\n        return {}\r\n\r\nBLESSINGS = setup_blessings()\r\n\r\ndef calculate_dps(cname, cdata, rdata, eq_name, jr_names, blessing_name=None, max_actions=15, force_no_ult=False, custom_equipments=None, target_count=3, force_moon_party=False):\r\n    \"\"\"\r\n    Main simulation engine for damage calculation.\r\n    Supports turns, hits, buffs, and dynamic passive stacking.\r\n    \"\"\"\r\n    if custom_equipments:\r\n        eq = custom_equipments[eq_name]\r\n    else:\r\n        eq = EQUIPMENTS[eq_name]\r\n    \r\n    if isinstance(jr_names, str): jr_names = [jr_names]\r\n    jrs = [JOURNEYS[j] for j in jr_names if j in JOURNEYS]\r\n    \r\n    # Add blessing to the modifier list\r\n    blessing = BLESSINGS.get(blessing_name)\r\n    if blessing:\r\n        jrs.append(blessing)\r\n    \r\n    res = cdata.get(\"공명\", {})\r\n    \r\n    # Initialize Character object\r\n    char_class = cdata.get(\"분류\", cdata.get(\"class\", \"Unknown\"))\r\n    char = Character(cname, char_class, {\r\n        StatType.ATK: cdata[\"기본_스탯\"][\"공격력\"],\r\n        StatType.SPEED: cdata[\"기본_스탯\"][\"속도\"],\r\n        StatType.CRIT_RATE: cdata[\"기본_스탯\"][\"치명타_확률\"],\r\n        StatType.CRIT_DAMAGE: cdata[\"기본_스탯\"][\"치명타_피해\"],\r\n        StatType.HP: cdata.get(\"기본_스탯\", {}).get(\"체력\", 0.0)\r\n    })\r\n    \r\n    # 1. Base Resonance & System Flat\r\n    char.add_permanent_modifier(Modifier(StatType.ATK, 1250, ModifierType.FLAT, \"StellaArchive\"))\r\n    char.add_permanent_modifier(Modifier(StatType.ATK, res.get(\"퍼센트\", 0), ModifierType.PERCENT, \"Resonance%\"))\r\n    char.add_permanent_modifier(Modifier(StatType.ATK, res.get(\"정수\", 0), ModifierType.FLAT, \"ResonanceFlat\"))\r\n    \r\n    # 2. Add Equipment & Journey modifiers\r\n    for mod in eq.get_all_modifiers(): char.add_permanent_modifier(mod)\r\n    for jr in jrs:\r\n        for mod in jr.modifiers: char.add_permanent_modifier(mod)\r\n    \r\n    # 3. Add Substats & System Constant\r\n    char.add_permanent_modifier(Modifier(StatType.ATK, 0.1625 + 0.01, ModifierType.PERCENT, \"Substats\"))\r\n    char.add_permanent_modifier(Modifier(StatType.ATK, 1000, ModifierType.FLAT, \"SystemConstant\"))\r\n    char.add_permanent_modifier(Modifier(StatType.SPEED, 60, ModifierType.FLAT, \"SubstatsSpd\"))\r\n    \r\n    # Passive Modifiers\r\n    if \"패시브\" in cdata:\r\n        p = cdata[\"패시브\"]\r\n        if \"공격력_퍼센트\" in p:\r\n            char.add_permanent_modifier(Modifier(StatType.ATK, p[\"공격력_퍼센트\"], ModifierType.PERCENT, \"PassiveAtk\"))\r\n        if \"치확_퍼센트\" in p:\r\n            char.add_permanent_modifier(Modifier(StatType.CRIT_RATE, p[\"치확_퍼센트\"], ModifierType.FLAT, \"PassiveCR\"))\r\n        if \"치피_퍼센트\" in p:\r\n            char.add_permanent_modifier(Modifier(StatType.CRIT_DAMAGE, p[\"치피_퍼센트\"], ModifierType.FLAT, \"PassiveCD\"))\r\n\r\n    # Capture final stats before dynamic stacking starts\r\n    final_stats = {\r\n        \"atk\": char.get_stat(StatType.ATK),\r\n        \"spd\": char.get_stat(StatType.SPEED),\r\n        \"cr\": char.get_stat(StatType.CRIT_RATE),\r\n        \"cd\": char.get_stat(StatType.CRIT_DAMAGE)\r\n    }\r\n\r\n    # Initial Stats (Check for AX in ANY journey)\r\n    has_ax = (blessing_name == \"AX\")\r\n    has_fx = (blessing_name == \"FX\")\r\n    has_ex = (blessing_name == \"EX\")\r\n    \r\n    # Pre-calculate AX Stacks if needed\r\n    ax_stacks = []\r\n    if has_ax:\r\n        cur_ax = 0\r\n        for t in rdata[\"turns\"]:\r\n            cur_ax = min(cur_ax + 1, 5)\r\n            ax_stacks.append(cur_ax)\r\n            if t.get(\"is_ult\", False) and not force_no_ult:\r\n                cur_ax = 0\r\n    \r\n    total_dmg, cycle_time, ga_red_carry, omega_dmg_stack, assassin_spd_stack, caster_cd_stack, ra_cr_stack = 0.0, 0.0, 0, 0, 0, 0, 0\r\n    max_hit_dmg = 0.0\r\n    fx_carry = 0.0\r\n    ex_basic_count = 0\r\n    ex_total_cr = 0.0\r\n    frey_hr = 0\r\n    frey_cr_turns = 0\r\n    charles_lucky_token_turns = 0 # Track Charles's Lucky Token\r\n    charles_atk_buff_turns = 0   # Track Charles's ATK 30% (2 turns)\r\n    rosaria_def_pen_turns = 0    # Track Rosaria's DEF Pen (3 turns after Ult)\r\n    smile_def_red_turns = 0 # Track Smile's DEF Red debuff\r\n    lydia_atk_stack = 0     # Lydia's Passive (6% x 5)\r\n    yumina_atk_stack = 0    # Yumina's Passive (4% x 5)\r\n    bleeding_dots = []\r\n    \r\n    # Universal Attribute (속성) Stack\r\n    attr_stack = 0\r\n    # Rosaria Ignition (업화)\r\n    is_rosaria = \"로자리아\" in cname\r\n    ros_ign_stack = 0\r\n\r\n    # v15.0 Dynamic Passive Stacks\r\n    p_stacks = {\"claire_cr\": 0, \"lydia_atk\": 0, \"yumina_atk\": 0, \"assera_cd\": 0}\r\n    # Engine Environment Detection (Flexible matching for UI-sanitized names)\r\n    # Normalize cname for robust detection (remove parentheses/hyphens)\r\n    cname_norm = cname.replace(\"(\", \"\").replace(\")\", \"\").replace(\"-\", \"\")\r\n    is_yumina = \"유미나\" in cname_norm\r\n    is_frey = \"프레이\" in cname_norm\r\n    is_moon_party = \"달속성파티\" in cname_norm or \"moon\" in cname.lower() or force_moon_party\r\n    \r\n    # Debug trace removed — was printing on every calculate_dps call (tens of thousands during meta-sweep)\r\n\r\n    is_jackpot = False\r\n    y_is_1lv = \"1lv\" in cname\r\n    y_crit_ga = 0.09 if y_is_1lv else 0.15\r\n    y_atk_rate = 0.02 if y_is_1lv else 0.04\r\n\r\n    rosa_atk_stack = 0\r\n    \r\n    turns = rdata[\"turns\"]\r\n    turns_count = len(turns)\r\n\r\n    hits = [] # For calculating average crit chance for Blood Echo\r\n\r\n    for action_idx in range(turns_count):\r\n        if action_idx >= max_actions:\r\n            break\r\n        \r\n        # 0. Prep action data\r\n        t = turns[action_idx]\r\n        m_di = 0.0 # Initialize Damage Increase for the current action\r\n        \r\n        is_ult = t.get(\"is_ult\", False)\r\n        if force_no_ult and is_ult:\r\n            is_ult = False\r\n            is_basic, is_spec, is_extra = True, False, False\r\n            coeff = 1.65 # Treat as basic\r\n        else:\r\n            is_basic = t.get(\"is_basic\", False)\r\n            is_ult = t.get(\"is_ult\", False)\r\n            is_extra = t.get(\"is_extra\", False)\r\n            is_spec = (not is_basic) and (not is_ult) and (not is_extra)\r\n            \r\n            # Dynamic HR (High-Roll) / Jackpot logic based on passive hr_확률\r\n            hr_rate = cdata.get(\"패시브\", {}).get(\"hr_확률\", 0)\r\n            # Frey's HR is handled by the frey_hr stack system (line ~421).\r\n            # Setting hr_rate=0 here to prevent double-counting.\r\n            if is_frey: hr_rate = 0\r\n            \r\n            coeff = t.get(\"coeff\", 0) + t.get(\"extra_coeff\", 0) * hr_rate\r\n            \r\n        curr_skill_type = \"궁극기\" if is_ult else (\"기본기\" if is_basic else \"특수기\")\r\n        curr_skill = cdata.get(\"스킬\", {}).get(curr_skill_type, {})\r\n\r\n        \r\n        is_aoe = \"전체 공격\" in curr_skill.get(\"부가\", \"\")\r\n        # Yumina Catalyst Exception: If Yumina's basic attack is used with \"경력직 용병\", it becomes AoE (Chain Attack).\r\n        is_yumina_chain = False\r\n        if \"유미나\" in cname and is_basic and any(j.name == \"경력직 용병\" for j in jrs):\r\n            is_aoe = True\r\n            is_yumina_chain = True\r\n\r\n        # 3. Attribute (Cooling) Stack Logic\r\n        # Universal Rule: Basic Attack +1, Frey/Epindel Special +3\r\n        # Strict 5-stack cap as requested.\r\n        attr_gain = 0\r\n        if is_basic:\r\n            attr_gain = 1\r\n        elif (is_frey or \"에핀델\" in cname) and is_spec:\r\n            attr_gain = 3\r\n            \r\n        attr_stack = min(5, attr_stack + attr_gain)\r\n        \r\n        # Cooling Reset Logic (at 5 stacks)\r\n        # Frey: Manstack (5) triggers passive reset\r\n        # Claire: 5 stacks trigger Extra Attack (handled by JSON, engine resets here)\r\n        if (is_frey or \"클레어\" in cname) and attr_stack >= 5:\r\n            attr_stack = 0\r\n        \r\n        # Rosaria Specific Logic\r\n        rosaria_extra_basic = False\r\n        if is_rosaria:\r\n            # Ignition probability: Basic -> + (attr * 0.20)\r\n            if is_basic:\r\n                ros_ign_stack = min(5, ros_ign_stack + attr_stack * 0.20)\r\n            # Spec uses Ignition\r\n            if is_spec:\r\n                ign_di = 0.0\r\n                if ros_ign_stack >= 3.0:\r\n                    ign_di = 0.20\r\n                    rosaria_extra_basic = True\r\n                    ros_ign_stack = 0\r\n                elif ros_ign_stack >= 2.0:\r\n                    ign_di = 0.20\r\n                    ros_ign_stack = 0\r\n                elif ros_ign_stack >= 1.0:\r\n                    ign_di = 0.10\r\n                    ros_ign_stack = 0\r\n                m_di += ign_di\r\n            # Ult gives Ignition +3\r\n            if is_ult:\r\n                ros_ign_stack = min(5, ros_ign_stack + 3)\r\n        \r\n        # Trigger Passives (v15.0 Dynamic Triggers)\r\n        \r\n        # 1. Turn-Start Triggers (Before time calculation)\r\n        if \"클레어(바니걸)\" in cname:\r\n            p_stacks[\"claire_cr\"] = min(3, p_stacks[\"claire_cr\"] + 1)\r\n            \r\n        # 2. Action-Start Triggers\r\n        if \"리디아\" in cname:\r\n            # Lydia: ATK +6% per action (max 5)\r\n            p_stacks[\"lydia_atk\"] = min(5, p_stacks[\"lydia_atk\"] + 1)\r\n        if \"아세라\" in cname and is_spec:\r\n            # Assera: CD +6% per Special (max 5)\r\n            p_stacks[\"assera_cd\"] = min(5, p_stacks[\"assera_cd\"] + 1)\r\n        if is_yumina:\r\n            # Yumina: ATK +4% per \"Action/Hit\" (simplified to per action for consistency, but user said hit)\r\n            # We'll use 1 stack per action here for now unless it's multi-hit.\r\n            p_stacks[\"yumina_atk\"] = min(5, p_stacks[\"yumina_atk\"] + 1)\r\n            \r\n        # Buff Application (Starts after Spec, so if it was set in PREVIOUS end-of-turn, it's active now)\r\n        cr_from_buff = 0.30 if (is_frey and frey_cr_turns > 0) else 0.0\r\n            \r\n        # Stacking logic for specialized Journeys\r\n        if any(j.name == \"키라만큼 귀여워\" for j in jrs): assassin_spd_stack = min(assassin_spd_stack + 1, 3)\r\n        if any(j.name == \"하늘의 심판\" for j in jrs): caster_cd_stack = min(caster_cd_stack + 1, 3)\r\n        if any(j.name == \"깊은 애도\" for j in jrs) and (is_basic or t.get(\"extra_coeff\", 0) > 0):\r\n            ra_cr_stack = min(ra_cr_stack + 1, 5)\r\n\r\n        # 0. Defense Calculation (v14.2)\r\n        target_def_base = 3000.0\r\n        # Check for DEF Reduction (Smile's debuff or Journey)\r\n        current_def_red = 0.30 if smile_def_red_turns > 0 else 0.0\r\n        \r\n        # DEF Penetration (stat-based + dynamic buffer)\r\n        def_pen_total = char.get_stat(StatType.DEF_PEN, []) + t.get(\"def_pen_buf\", 0.0)\r\n            \r\n        effective_def = target_def_base * (1.0 - current_def_red) * (1.0 - def_pen_total)\r\n        def_multiplier = 1.0 - (effective_def / (effective_def + 3000.0))\r\n\r\n        # Dynamic ATK Multipliers (now primarily in t['atk_buf'])\r\n\r\n        dyn_mods = []\r\n        if assassin_spd_stack > 0: dyn_mods.append(Modifier(StatType.SPEED, assassin_spd_stack * 10, ModifierType.FLAT, \"AssassinStack\"))\r\n        \r\n        final_spd = char.get_stat(StatType.SPEED, dyn_mods) * t.get(\"spd_mult\", 1.0)\r\n        \r\n        # Extra Attack (TN+) / Extra Turn (TN+1) Logic\r\n        if not t.get(\"is_extra_attack\", False):\r\n            is_extra_turn = t.get(\"is_extra_turn\", False)\r\n            if is_extra_turn:\r\n                turn_time = 0.0\r\n            else:\r\n                eff_ga = min(ga_red_carry, 0.99) # 음수 방지\r\n                turn_time = (1000.0 / final_spd) * (1.0 - eff_ga)\r\n            cycle_time += turn_time\r\n            ga_red_carry = 0.0 # Consume carry\r\n            \r\n        # Register next AG reduction if applicable\r\n        if not force_no_ult:\r\n            ga_red_carry += t.get(\"ag_boost\", 0.0)\r\n        \r\n        if any(j.name == \"허수의 개척자\" for j in jrs):\r\n            if is_spec: omega_dmg_stack = min(omega_dmg_stack + 1, 5)\r\n\r\n        # Apply Character Passive Stacks to stat pools (v15.0)\r\n        dyn_atk_p_sum = 0.0\r\n        if \"리디아\" in cname: dyn_atk_p_sum += p_stacks[\"lydia_atk\"] * 0.06\r\n        if is_yumina: \r\n            y_atk_rate = 0.02 if y_is_1lv else 0.04\r\n            dyn_atk_p_sum += p_stacks[\"yumina_atk\"] * y_atk_rate\r\n        \r\n        # Collect DI and Buffs from turn data\r\n        for k, v in t.items():\r\n            if k.endswith(\"_di\"): m_di += v\r\n            if k.endswith(\"_atk_p\"): dyn_atk_p_sum += v\r\n        \r\n        # 1. Raw Pool (Stella Archive only)\r\n        raw_pool = (cdata[\"기본_스탯\"][\"공격력\"] + 1250)\r\n        \r\n        # 2. Static ATK% (Equipment% + Journey% + Substats%)\r\n        eq_jr_atk_p = 0.0\r\n        for mod in char.permanent_modifiers:\r\n            if mod.stat_type == StatType.ATK and mod.mod_type == ModifierType.PERCENT:\r\n                # Exclude Resonance% and StellaArchive\r\n                if mod.source not in [\"Resonance%\", \"StellaArchive\", \"Substats\", \"SystemConstant\"]:\r\n                    eq_jr_atk_p += mod.value\r\n        \r\n        static_atk_p = eq_jr_atk_p + (0.1625 + 0.01) # Substats fixed %\r\n        # Standard v14.1 eff_base: Resonance is excluded from multipliers\r\n        eff_base = raw_pool * (1.0 + static_atk_p) + 1000\r\n        \r\n        # 3. Dynamic ATK and Multipliers (v14.3 Unified Summation)\r\n        # Formula: eff_atk = eff_base * (1 + Σ(Dynamic_Atk_Buffs)) + resonance\r\n        # Summing all dynamic buffs: AX + Json_Atk_Buf + Passive_Stacks + Multiplier_Effects\r\n        \r\n        res_p = res.get(\"퍼센트\", 0)\r\n        res_flat = res.get(\"정수\", 0)\r\n        resonance_val = (raw_pool * res_p + res_flat)\r\n        \r\n        # dyn_atk_p_sum is already initialized and populated by passive stacks\r\n        if has_ax:\r\n            dyn_atk_p_sum += ax_stacks[action_idx] * 0.08\r\n            \r\n        # 피의 메아리 (v26.0)\r\n        if any(j.name == \"피의 메아리\" for j in jrs):\r\n            dyn_atk_p_sum += rosa_atk_stack * 0.03\r\n            \r\n        # Final multiplicative formula for dynamic buffs\r\n        eff_atk = eff_base * (1.0 + dyn_atk_p_sum) + resonance_val\r\n        \r\n        # Final Crit/CD Calculation including Passives (v15.0)\r\n        final_cr = char.get_stat(StatType.CRIT_RATE, []) + t.get(\"cr_buf\", 0) + cr_from_buff\r\n        if \"클레어(바니걸)\" in cname: final_cr += p_stacks[\"claire_cr\"] * 0.10\r\n        if any(j.name == \"깊은 애도\" for j in jrs): final_cr += ra_cr_stack * 0.05\r\n        \r\n        final_cd = char.get_stat(StatType.CRIT_DAMAGE, []) + t.get(\"cd_buf\", 0) + caster_cd_stack * 0.10\r\n        if \"아세라\" in cname: final_cd += p_stacks[\"assera_cd\"] * 0.06\r\n        \r\n        eff_cr = min(1.0, final_cr)\r\n        eff_cd = final_cd\r\n        \r\n        # Jackpot logic removed (handled by JSON)\r\n        # if is_frey and is_basic and frey_hr >= 5:\r\n        #     frey_hr = 0\r\n            \r\n        # (dmg_raw removed — was dead code, not used in final damage formula)\r\n        \r\n        # 4. Crit Calculation (OLD - to be replaced by final_cr/final_cd)\r\n        cr_i = eff_cr\r\n        cd_i = eff_cd\r\n        \r\n        omega_boost = (omega_dmg_stack * 0.05) if (is_spec or t.get(\"omega_elig\", False)) else 0.0\r\n        total_di = t.get(\"di\", 0) + m_di + omega_boost + fx_carry\r\n        if \"샤를(바니걸)\" in cname and is_ult:\r\n            total_di += min(attr_stack * 0.05, 0.25)\r\n\r\n        # Special Journey Logic (e.g., Chain Damage)\r\n        chain_dmg = 0\r\n        # Yumina Chain Attack: No Crit for AoE basic\r\n        if is_yumina_chain:\r\n            cr_i = 0.0\r\n            \r\n        # 5. HR (High-Roll) Calculation for Frey\r\n        # HR triggers ONLY on basic attacks when stack is full (5)\r\n        hr_prob = 0.0\r\n        if is_frey and frey_hr >= 5 and is_basic:\r\n            hr_prob = 1.0\r\n            frey_hr = 0\r\n            \r\n        # Final Damage with Defense (v15.0 - HR and Multipliers correctly integrated)\r\n        # HR adds a separate multiplicative term: hr_prob * coeff (where coeff is effectively extra_coeff)\r\n        turn_dmg = (eff_atk * coeff * (1.0 + total_di + cr_i * cd_i + hr_prob) + chain_dmg) * def_multiplier\r\n        \r\n        # Max Hit: Assuming all hits in this turn are CRITICAL (cr_i = 1.0) and HR (hr_prob = 1.0)\r\n        peak_turn_dmg = (eff_atk * coeff * (1.0 + total_di + cd_i + 1.0) + chain_dmg) * def_multiplier\r\n        \r\n        # Rosaria Extra Basic (Crit Peak)\r\n        if rosaria_extra_basic:\r\n            ros_peak = (eff_atk * 1.50 * (1.0 + total_di + cd_i)) * def_multiplier\r\n            peak_turn_dmg += ros_peak\r\n            turn_dmg += (eff_atk * 1.50 * (1.0 + total_di + cr_i * cd_i)) * def_multiplier\r\n        \r\n        total_dmg += turn_dmg\r\n        max_hit_dmg = max(max_hit_dmg, peak_turn_dmg)\r\n        \r\n        hits = t.get(\"hits\", 4 if is_ult else 1)\r\n        prob_crit_any = (1.0 - (1.0 - cr_i) ** hits)\r\n        # ga_red_carry = 0.0 # REMOVED: This was overwriting JSON ag_boost!\r\n        \r\n        # FX Carry: Next turn DI +25% if Crit (Statistical: current_turn_cr * 0.25)\r\n        if has_fx and t.get(\"coeff\", 0) > 0:\r\n            fx_carry = cr_i * 0.25\r\n        elif t.get(\"coeff\", 0) > 0:\r\n            fx_carry = 0.0\r\n            \r\n        # EX Tracker\r\n        if has_ex and is_basic:\r\n            ex_basic_count += 1\r\n            ex_total_cr += cr_i\r\n        \r\n        # AG Gain (Action Gauge) Tracking\r\n        p_ga = cdata.get(\"패시브\", {}).get(\"행동게이지_상수\", 0)\r\n        if (is_basic or t.get(\"is_extra_attack\", False)) and p_ga > 0:\r\n            ga_red_carry += p_ga\r\n            \r\n        if is_yumina:\r\n            ga_red_carry += y_crit_ga * prob_crit_any\r\n        # Moon Party AG boost is handled below in the Frey-specific section (0.24 = 8% x 3 allies)\r\n        if is_ult:\r\n            if \"로자리아\" in cname: ga_red_carry += 0.50\r\n            if \"리디아\" in cname: ga_red_carry += 0.30\r\n            if \"스마일\" in cname: smile_def_red_turns = 2 # Apply 30% DEF Red for 2 turns\r\n        \r\n        # Buff/Debuff decrement\r\n        smile_def_red_turns = max(0, smile_def_red_turns - 1)\r\n        if t.get(\"note\"):\r\n            if \"행게+30%\" in t[\"note\"]: ga_red_carry += 0.30\r\n            if \"행게+50%\" in t[\"note\"]: ga_red_carry += 0.50\r\n        \r\n        # Frey End-of-Turn & Ally Triggers\r\n        # [Turn-based]: Allies act on THEIR own turns between Frey's turns.\r\n        # So ally HR stacks apply every Frey turn, regardless of Frey's action type.\r\n        if is_frey:\r\n            hr_gain = 0\r\n            if is_ult:\r\n                hr_gain += 3  # Ult skill: HR+3\r\n            if is_moon_party:\r\n                ga_red_carry += 0.24  # AG +8% x 3 allies\r\n                hr_chance = 0.5 if \"1lv\" in cname else 1.0\r\n                hr_gain += int(3 * hr_chance)  # +1 stack per ally, 3 allies\r\n            frey_hr = min(frey_hr + hr_gain, 5)  # Single cap at 5\r\n            # CR buff (separate from HR stack and cooldown)\r\n            frey_cr_turns = max(0, frey_cr_turns - 1)\r\n            if is_spec:\r\n                frey_cr_turns = 3\r\n        \r\n        # Attribute Stack is now handle by pre-generator for most effects,\r\n        # but we keep the state updates here for any remaining logic if needed.\r\n        # (Though most should be in t.get('attribute_stack'))\r\n        \r\n        # 6. Post-Action stack updates\r\n        is_crit = (random.random() < eff_cr) # This is a statistical simulation, not a true random roll for a single run.\r\n                                              # For average DPS, we assume average crit rate applies.\r\n                                              # However, for conditional stacks like Blood Echo, we need a \"crit\" event.\r\n                                              # For now, we'll use the effective crit rate as a probability.\r\n        \r\n        # 피의 메아리 Stack Update (target_count reflects Boss=1, Normal=3)\r\n        # Note: Yumina's catalyzed basic (is_yumina_chain) is a chain attack and cannot crit, \r\n        # so it effectively skips this if is_crit is correctly calculated.\r\n        # But we force the check 'not is_yumina_chain' for safety.\r\n        if any(j.name == \"피의 메아리\" for j in jrs) and is_aoe and is_crit and (not is_yumina_chain):\r\n            rosa_atk_stack = min(5, rosa_atk_stack + target_count)\r\n            \r\n        # This `hits` list was likely intended for something else, but it's not used.\r\n        # If it's meant to track individual hit damage for a more complex crit simulation,\r\n        # it needs to be integrated differently. For average DPS, the `cr_i * cd_i` term\r\n        # already accounts for average crit damage.\r\n        # if is_crit:\r\n        #     hits.append(dmg_raw * (1.0 + cd_i))\r\n\r\n\r\n    return (total_dmg / cycle_time) if cycle_time > 0 else 0, total_dmg, cycle_time, total_dmg, max_hit_dmg, final_stats\r\n\r\n\r\ndef get_valid_journeys(char_name, char_class):\r\n    valid = []\r\n    for name, jr in JOURNEYS.items():\r\n        rest = jr.restrict\r\n        if not rest:\r\n            valid.append(name)\r\n            continue\r\n        if \"char\" in rest and rest[\"char\"] == char_name:\r\n            valid.append(name)\r\n            continue\r\n        if \"class\" in rest and rest[\"class\"] == char_class:\r\n            valid.append(name)\r\n            continue\r\n    return valid\r\n\r\ndef find_best_journeys(char_name, char_class, cdata, rdata, eq_name, n=5, use_total_dmg=False, substat_vars=None, target_count=3, force_moon_party=False, max_actions=15):\r\n    valid_names = get_valid_journeys(char_name, char_class)\r\n    \r\n    # Temporarily override EQUIPMENTS if substat_vars provided\r\n    local_eqs = None\r\n    if substat_vars:\r\n        local_eqs = setup_equipments(substat_vars)\r\n    specials = [\"AX\", \"FX\", \"EX\"]\r\n    commons = [s for s in valid_names if s not in specials]\r\n    \r\n    combos = []\r\n    if char_class == \"어쌔신\" and \"키라만큼 귀여워\" in valid_names:\r\n        mandatory = \"키라만큼 귀여워\"\r\n        others = [v for v in commons if v != mandatory]\r\n        if len(others) >= n - 1:\r\n            for combo in itertools.combinations(others, n - 1):\r\n                combos.append([mandatory] + list(combo))\r\n    elif len(commons) >= n:\r\n        combos.extend(list(itertools.combinations(commons, n)))\r\n    \r\n    if not combos:\r\n        print(f\"Warning: No journey combinations of size {n} found for {char_name} (Available: {len(commons)})\")\r\n    \r\n    # SWEEP: Try both Standard and No-Ult configurations\r\n    max_val_std, best_combo_std, best_bless_std, max_hit_std, best_stats_std = -1, [], None, 0.0, {}\r\n    max_val_nu, best_combo_nu, best_bless_nu, max_hit_nu, best_stats_nu = -1, [], None, 0.0, {}\r\n    \r\n    available_blessings = [None] + [b for b in BLESSINGS.keys()]\r\n    \r\n    for b_name in available_blessings:\r\n        for combo in combos:\r\n            # Test Standard\r\n            dps_s, total_s, _, _, max_h_s, stats_s = calculate_dps(char_name, cdata, rdata, eq_name, list(combo), b_name, max_actions, False, local_eqs, target_count=target_count, force_moon_party=force_moon_party)\r\n            target_s = total_s if (use_total_dmg or max_actions <= 5) else dps_s\r\n            if target_s > max_val_std:\r\n                max_val_std, best_combo_std, best_bless_std, max_hit_std, best_stats_std = target_s, list(combo), b_name, max_h_s, stats_s\r\n            \r\n            # Test No-Ult\r\n            dps_n, total_n, _, _, max_h_n, stats_n = calculate_dps(char_name, cdata, rdata, eq_name, list(combo), b_name, max_actions, True, local_eqs, target_count=target_count, force_moon_party=force_moon_party)\r\n            target_n = total_n if (use_total_dmg or max_actions <= 5) else dps_n\r\n            if target_n > max_val_nu:\r\n                max_val_nu, best_combo_nu, best_bless_nu, max_hit_nu, best_stats_nu = target_n, list(combo), b_name, max_h_n, stats_n\r\n\r\n    return {\r\n        \"standard\": (best_combo_std, best_bless_std, max_val_std, max_hit_std, best_stats_std),\r\n        \"no_ult\": (best_combo_nu, best_bless_nu, max_val_nu, max_hit_nu, best_stats_nu)\r\n    }\r\n\r\ndef main():\r\n    import pandas as pd\r\n    global EQUIPMENTS\r\n    substat_vars = get_interactive_substats()\r\n    EQUIPMENTS = setup_equipments(substat_vars)\r\n    use_total_dmg = (substat_vars.get(\"METRIC\", 2) == 2)\r\n\r\n    # 2. Specs\r\n    try:\r\n        with open(\"Data/characters.json\", \"r\", encoding=\"utf-8\") as f:\r\n            specs = json.load(f)\r\n    except:\r\n        specs = extract_json_from_md(\"Data/캐릭터_스펙_마스터.md\")\r\n        \r\n    rotations = extract_json_from_md(\"Data/사이클_로테이션_마스터.md\")\r\n    results = []\r\n    \r\n    metric_label = \"Total Damage\" if use_total_dmg else \"DPS\"\r\n    print(f\"\\n[Star Savior Optimization Engine v14.0]\")\r\n    print(f\" - Optimization Metric: {metric_label}\")\r\n    \r\n    for cname, cdata in specs.items():\r\n        if cname not in rotations: continue\r\n        rdata = rotations[cname]\r\n        char_class = cdata.get(\"분류\", cdata.get(\"class\", \"Unknown\"))\r\n        if char_class == \"디펜더\": continue\r\n        \r\n        # Determine if character has AoE and should be split (Except Yumina per request)\r\n        has_aoe_skill = False\r\n        for sk in cdata.get(\"스킬\", {}).values():\r\n            if \"전체 공격\" in sk.get(\"부가\", \"\"):\r\n                has_aoe_skill = True\r\n                break\r\n        \r\n        sim_configs = []\r\n        if has_aoe_skill and (\"유미나\" not in cname):\r\n            sim_configs = [(1, \"(보스1인)\"), (3, \"(일반3인)\")]\r\n        else:\r\n            sim_configs = [(3, \"\")] # Default target count is 3 (for consistency)\r\n            \r\n        for t_count, suffix in sim_configs:\r\n            display_name = f\"{cname}{suffix}\"\r\n            \r\n            for eq_name in EQUIPMENTS.keys():\r\n                # Meta-Sweep (Standard & No-Ult)\r\n                best_stats = find_best_journeys(cname, char_class, cdata, rdata, eq_name, 5, use_total_dmg, target_count=t_count)\r\n                \r\n                # 1. Standard Rotation\r\n                s_jrs, s_bless, s_val, s_max_h, s_stats = best_stats[\"standard\"]\r\n                # For Gauntlet, we ONLY care about 3T and Total Damage\r\n                t_limits = [3] if \"건틀릿\" in suffix else [5, 10, 15]\r\n                for t_limit in t_limits:\r\n                    dps, total, _, _, max_h, stats = calculate_dps(cname, cdata, rotations[cname], eq_name, s_jrs, s_bless, t_limit, False, target_count=t_count)\r\n                    results.append({\r\n                        \"Character\": display_name, \"Equip\": eq_name, \"Strategy\": \"Standard Rotation\",\r\n                        \"Blessing\": s_bless or \"None\", \"Journeys\": \" | \".join(s_jrs), \"Turns\": t_limit, \"DPS\": round(total if t_limit==3 else dps, 2),\r\n                        \"TotalDmg\": round(total, 2), \"MaxHit\": round(max_h, 2), \"Stats\": stats\r\n                    })\r\n                \r\n                # 2. No-Ult Alternative\r\n                n_jrs, n_bless, n_val, n_max_h, n_stats = best_stats[\"no_ult\"]\r\n                for t_limit in t_limits:\r\n                    dps, total, _, _, max_h, stats = calculate_dps(cname, cdata, rotations[cname], eq_name, n_jrs, n_bless, t_limit, True, target_count=t_count)\r\n                    results.append({\r\n                        \"Character\": display_name, \"Equip\": eq_name, \"Strategy\": \"No-Ult AX Stacking\",\r\n                        \"Blessing\": n_bless or \"None\", \"Journeys\": \" | \".join(n_jrs), \"Turns\": t_limit, \"DPS\": round(total if t_limit==3 else dps, 2),\r\n                        \"TotalDmg\": round(total, 2), \"MaxHit\": round(max_h, 2), \"Stats\": stats\r\n                    })\r\n                \r\n                print(f\" > {display_name} | {eq_name}: Standard {s_val:,.0f} / No-Ult {n_val:,.0f}\")\r\n\r\n    # Generate Top 3 Summary Report\r\n    df = pd.DataFrame(results)\r\n    df.to_csv(\"Results/dps_results.csv\", index=False, encoding=\"utf-8-sig\")\r\n    \r\n    output_path = sys.argv[1] if len(sys.argv) > 1 else \"Results/optimization_guide.md\"\r\n    with open(output_path, \"w\", encoding=\"utf-8\") as f:\r\n        f.write(\"# 스타 세이비어 캐릭터별 최적화 가이드 (Multi-Journey Edition)\\n\\n\")\r\n        f.write(\"> **업데이트 일시**: 2026-04-02\\n\")\r\n        f.write(\"> **설명**: 5개의 여정 조합을 최우선으로 고려한 베스트 빌드 리포트입니다.\\n\\n\")\r\n        \r\n        # 📋 구원자 목록 (Saviors List) 자동 생성\r\n        f.write(\"### 📋 구원자 목록 (Saviors List)\\n\")\r\n        char_list = df[\"Character\"].unique()\r\n        for i, label in enumerate(char_list):\r\n            anchor = label.replace(\"(\", \"\").replace(\")\", \"\").replace(\",\", \"\").replace(\" \", \"-\").lower() \r\n            if i % 3 == 0: f.write(\"- \")\r\n            f.write(f\"[{label}](#{anchor})\")\r\n            if (i + 1) % 3 == 0: f.write(\"\\n\")\r\n            elif i < len(char_list) - 1: f.write(\" | \")\r\n        if len(char_list) % 3 != 0: f.write(\"\\n\")\r\n        f.write(\"\\n---\\n\\n\")\r\n        \r\n        for label in char_list:\r\n            f.write(f\"## {label}\\n\\n\")\r\n            char_df = df[df[\"Character\"] == label]\r\n            \r\n            # ### 1. Standard Strategy section\r\n            # 1. Standard Strategy (Ultimate Use)\r\n            f.write(\"### 🔹 Standard Strategy (Ultimate Use)\\n\")\r\n            f.write(\"> **공천**: 캐릭터 고유의 스킬 메커니즘을 100% 활용하는 권장 로테이션입니다.\\n\\n\")\r\n            \r\n            std_all = char_df[(char_df[\"Strategy\"] == \"Standard Rotation\") & (char_df[\"Turns\"] == 15)].sort_values(\"DPS\", ascending=False)\r\n            \r\n            # Identify Best 1 per 4-piece category\r\n            categories = [\"공격4\", \"통찰4\", \"파괴4\", \"체력4\"]\r\n            best_per_cat = {}\r\n            for cat in categories:\r\n                cat_df = std_all[std_all[\"Equip\"].str.startswith(cat)].head(1)\r\n                if not cat_df.empty:\r\n                    best_per_cat[cat] = cat_df.iloc[0]\r\n            \r\n            f.write(\"| 순위 | 장비 세트 | 축복 | 최적 여정 조합 (Top 5) | DPS (15T) | MaxHit | ATK | CR | CD | SPD |\\n\")\r\n            f.write(\"| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\\n\")\r\n            for i, row in enumerate(std_all.head(3).itertuples(), 1):\r\n                st = row.Stats\r\n                f_cr, f_cd = f\"{st['cr']*100:.1f}%\", f\"{st['cd']*100:.1f}%\"\r\n                f.write(f\"| {i} | {row.Equip} | **{row.Blessing}** | {row.Journeys} | **{row.DPS:,.2f}** | {row.MaxHit:,.0f} | {st['atk']:,.0f} | {f_cr} | {f_cd} | {st['spd']:.0f} |\\n\")\r\n            \r\n            # Build Trajectory Analysis (v19.0)\r\n            if not std_all.empty:\r\n                f.write(\"\\n#### 📈 빌드 진화 경로 (Optimal Build Trajectory)\\n\")\r\n                f.write(\"> 부옵션 성장(0%~50%)에 따른 실시간 최적 조합 변화입니다.\\n\\n\")\r\n                \r\n                cat_equip_names = [best_per_cat[c].Equip for c in categories if c in best_per_cat]\r\n                \r\n                for stype, label_ko in [(StatType.ATK, \"공격력%\"), (StatType.CRIT_DAMAGE, \"치명타 피해\"), (StatType.CRIT_RATE, \"치명타 확률\")]:\r\n                    f.write(f\"- **{label_ko}** 성장 경로:\\n\")\r\n                    # Extract original cname by stripping suffix for specs/rotations lookup\r\n                    cname_key = re.sub(r'\\(보스1인\\)|\\(일반3인\\)', '', label)\r\n                    path = profile_stat_scaling(label, specs[cname_key], rotations[cname_key], cat_equip_names, stype, 0.5, 0.125, find_best_journeys, substat_vars)\r\n                    \r\n                    # Deduplicate and show transitions\r\n                    last_point = None\r\n                    for pt in path:\r\n                        # ✅ 장비, 축복, 여정 조합 중 하나라도 바뀌면 출력 (여정 변화도 감지)\r\n                        if not last_point or pt[\"equip\"] != last_point[\"equip\"] or pt[\"blessing\"] != last_point[\"blessing\"] or pt[\"journeys\"] != last_point[\"journeys\"]:\r\n                            # ✅ DPS 및 MaxHit 수치 추가\r\n                            f.write(f\"  - **+{pt['increment']*100:4.1f}%**: {pt['equip']} ({pt['blessing']}) | **DPS: {pt['dps']:,.0f}** | **MaxHit: {pt['max_hit']:,.0f}** | {pt['journeys']}\\n\")\r\n                            last_point = pt\r\n                \r\n                f.write(\"\\n> (주어전) **표기 방식**: 증가량: 장비세트 (축복) | 주요 여정 리스트\\n\")\r\n\r\n            # ### 2. No-Ult Strategy section\r\n            f.write(\"\\n### 🔸 Alternative: No-Ult Strategy (AX Stacking)\\n\")\r\n            f.write(\"> **참고**: 궁극기를 포기하고 AX 스택 피해량에 올인한 특수 상황용 고점 빌드입니다.\\n\\n\")\r\n            nu_df = char_df[(char_df[\"Strategy\"] == \"No-Ult AX Stacking\") & (char_df[\"Turns\"] == 15)].sort_values(\"DPS\", ascending=False).head(1)\r\n            \r\n            f.write(\"| 구분 | 장비 세트 | 축복 | 최적 여정 조합 (Top 5) | DPS (15T) | MaxHit | ATK | CR | CD | SPD |\\n\")\r\n            f.write(\"| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\\n\")\r\n            for row in nu_df.itertuples():\r\n                st = row.Stats\r\n                f_cr, f_cd = f\"{st['cr']*100:.1f}%\", f\"{st['cd']*100:.1f}%\"\r\n                f.write(f\"| **최고점** | {row.Equip} | **{row.Blessing}** | {row.Journeys} | **{row.DPS:,.2f}** | {row.MaxHit:,.0f} | {st['atk']:,.0f} | {f_cr} | {f_cd} | {st['spd']:.0f} |\\n\")\r\n            \r\n            f.write(\"\\n---\\n\\n\")\r\n\r\n    print(\"\\n[OK] Optimization Report generated in Results/optimization_guide.md\")\r\n\r\nif __name__ == \"__main__\":\r\n    main()\r\n", "Core/data_loader_v5.py": "import json\nimport re\n# import pandas as pd (Moved inside functions requiring it to optimize PyScript)\nfrom typing import Dict, List\nfrom Core.models_v5 import EquipmentPiece, EquipmentSet, Modifier, StatType, ModifierType, Arcana, Journey\n\ndef extract_json_from_md(filepath: str) -> Dict:\n    \"\"\"Extracts all JSON blocks from a markdown file and merges them.\"\"\"\n    with open(filepath, 'r', encoding='utf-8', errors='replace') as f:\n        content = f.read()\n    json_blocks = re.findall(r'```json\\s+(.*?)\\s+```', content, re.DOTALL)\n    parsed_data = {}\n    for block in json_blocks:\n        try:\n            # Handle basic arithmetic like \"3614+1250\"\n            block = re.sub(r'([0-9.]+)\\+([0-9.]+)', lambda m: str(float(m.group(1)) + float(m.group(2))), block)\n            if block.strip().startswith('\"'):\n                data = json.loads(\"{\" + block + \"}\")\n                parsed_data.update(data)\n            else:\n                data = json.loads(block)\n                if \"이름\" in data:\n                    parsed_data[data[\"이름\"]] = data\n                else:\n                    parsed_data.update(data)\n        except Exception as e:\n            print(f\"Warning: Failed to parse JSON block in {filepath}: {e}\")\n            continue\n    return parsed_data\n\ndef load_equipments_from_list(data: List[Dict], substat_vars: Dict[str, float] = None) -> Dict[str, EquipmentSet]:\n    \"\"\"Parses a list of full equipment sets.\"\"\"\n    vars = {\"$ATK$\": 0.0, \"$SPD$\": 0.0, \"$CR$\": 0.0, \"$CD$\": 0.0}\n    if substat_vars: vars.update(substat_vars)\n    \n    registry = {}\n    for item in data:\n        name = item[\"name\"]\n        pieces = {}\n        for slot, mod_list in item.get(\"pieces\", {}).items():\n            modifiers = []\n            if isinstance(mod_list, list):\n                for m in mod_list:\n                    val = vars.get(m[\"value\"], m[\"value\"]) if isinstance(m[\"value\"], str) else m[\"value\"]\n                    modifiers.append(Modifier(StatType[m[\"stat\"]], val, ModifierType[m[\"type\"]]))\n            pieces[slot] = EquipmentPiece(name=f\"{name}_{slot}\", slot=slot, modifiers=modifiers)\n            \n        set_modifiers = []\n        for m in item.get(\"set_modifiers\", item.get(\"modifiers\", [])):\n            val = vars.get(m[\"value\"], m[\"value\"]) if isinstance(m[\"value\"], str) else m[\"value\"]\n            set_modifiers.append(Modifier(StatType[m[\"stat\"]], val, ModifierType[m[\"type\"]]))\n            \n        registry[name] = EquipmentSet(name, pieces, set_modifiers, item.get(\"set_bonus_name\", \"\"))\n    return registry\n\ndef load_combined_equipments(data: Dict, substat_vars: Dict[str, float] = None) -> Dict[str, EquipmentSet]:\n    \"\"\"Combines 4-piece sets and 2-piece sets into all possible full builds.\"\"\"\n    vars = {\"$ATK$\": 0.0, \"$SPD$\": 0.0, \"$CR$\": 0.0, \"$CD$\": 0.0}\n    if substat_vars: vars.update(substat_vars)\n\n    def parse_mods(mod_list):\n        mods = []\n        for m in mod_list:\n            val = vars.get(m[\"value\"], m[\"value\"]) if isinstance(m[\"value\"], str) else m[\"value\"]\n            mods.append(Modifier(StatType[m[\"stat\"]], val, ModifierType[m[\"type\"]]))\n        return mods\n\n    base_pieces = {}\n    for slot, mods in data.get(\"base_pieces\", {}).items():\n        base_pieces[slot] = EquipmentPiece(name=slot, slot=slot, modifiers=parse_mods(mods))\n\n    registry = {}\n    for f_name, f_mods_raw in data.get(\"four_piece_sets\", {}).items():\n        for t_name, t_mods_raw in data.get(\"two_piece_sets\", {}).items():\n            comb_name = f\"{f_name}4+{t_name}2\"\n            combined_set_mods = parse_mods(f_mods_raw) + parse_mods(t_mods_raw)\n            registry[comb_name] = EquipmentSet(comb_name, base_pieces, combined_set_mods, f\"{f_name}/{t_name}\")\n    return registry\n\ndef load_equipments_from_json(filepath: str, substat_vars: Dict[str, float] = None) -> Dict[str, EquipmentSet]:\n    with open(filepath, 'r', encoding='utf-8') as f:\n        data = json.load(f)\n    if isinstance(data, dict) and \"four_piece_sets\" in data:\n        return load_combined_equipments(data, substat_vars)\n    return load_equipments_from_list(data, substat_vars)\n\ndef load_equipments_from_df(df) -> Dict[str, EquipmentSet]:\n    import pandas as pd\n    \"\"\"\n    Expects a DataFrame with columns: name, stat, value, type\n    \"\"\"\n    registry = {}\n    for name, group in df.groupby(\"name\"):\n        modifiers = []\n        for _, row in group.iterrows():\n            if pd.isna(row[\"stat\"]): continue\n            stat_type = StatType[row[\"stat\"]]\n            mod_type = ModifierType[row[\"type\"]]\n            modifiers.append(Modifier(stat_type, row[\"value\"], mod_type))\n        registry[name] = Equipment(name, modifiers)\n    return registry\n\ndef load_arcanas_from_json(filepath: str) -> Dict[str, Arcana]:\n    with open(filepath, 'r', encoding='utf-8') as f:\n        data = json.load(f)\n    if \"arcanas_set\" not in data:\n        return {}\n    \n    registry = {}\n    for name, a_data in data[\"arcanas_set\"].items():\n        modifiers = []\n        for m in a_data.get(\"modifiers\", []):\n            modifiers.append(Modifier(StatType[m[\"stat\"]], m[\"val\"], ModifierType[m[\"type\"]]))\n        registry[name] = Arcana(name, a_data[\"target\"], modifiers, a_data[\"type\"])\n    return registry\n\ndef load_journeys_from_json(filepath: str) -> Dict[str, Journey]:\n    with open(filepath, 'r', encoding='utf-8') as f:\n        data = json.load(f)\n    if \"journeys\" not in data:\n        return {}\n    \n    registry = {}\n    for name, j_data in data[\"journeys\"].items():\n        modifiers = []\n        for m in j_data.get(\"modifiers\", []):\n            modifiers.append(Modifier(StatType[m[\"stat\"]], m[\"val\"], ModifierType[m[\"type\"]]))\n        registry[name] = Journey(name, modifiers, j_data[\"type\"], j_data.get(\"restrict\", {}))\n    return registry\n\ndef load_blessings_from_json(filepath: str) -> Dict[str, Journey]:\n    with open(filepath, 'r', encoding='utf-8') as f:\n        data = json.load(f)\n    if \"arcana_blessing\" not in data:\n        return {}\n    \n    registry = {}\n    for b_name, b_data in data[\"arcana_blessing\"].items():\n        modifiers = []\n        if \"base_val\" in b_data:\n            stat = StatType[b_data[\"stat\"]]\n            val = b_data[\"base_val\"]\n            m_type = ModifierType.PERCENT if b_data[\"stat\"] == \"ATK\" else ModifierType.FLAT\n            modifiers.append(Modifier(stat, val, m_type, f\"Blessing_{b_name}\"))\n        # Treat as journey for system compatibility\n        registry[b_name] = Journey(b_name, modifiers, b_name, {})\n    return registry\n", "Core/models_v5.py": "from dataclasses import dataclass, field\nfrom enum import Enum, auto\nfrom typing import List, Dict, Optional, Any\n\nclass StatType(Enum):\n    ATK = auto()\n    SPEED = auto()\n    CRIT_RATE = auto()\n    CRIT_DAMAGE = auto()\n    HP = auto()\n    DAMAGE_INCREASE = auto() # DI\n    DEF_PEN = auto()\n    AG_GAIN = auto() # Action Gauge Gain\n\nclass ModifierType(Enum):\n    FLAT = auto()\n    PERCENT = auto()       # Added to (1 + base)\n    MULTIPLICATIVE = auto() # Multiplied to total\n\n@dataclass\nclass Modifier:\n    stat_type: StatType\n    value: float\n    mod_type: ModifierType = ModifierType.FLAT\n    source: str = \"Unknown\"\n\n@dataclass\nclass EquipmentPiece:\n    name: str = \"Unnamed Piece\"\n    slot: str = \"None\"\n    modifiers: List[Modifier] = field(default_factory=list)\n\n@dataclass\nclass Equipment:\n    name: str\n    modifiers: List[Modifier] = field(default_factory=list)\n\n    def get_all_modifiers(self) -> List[Modifier]:\n        return self.modifiers\n\n@dataclass\nclass EquipmentSet:\n    name: str\n    pieces: Dict[str, EquipmentPiece] = field(default_factory=dict)\n    # Fixed set-wide bonuses (e.g., Attack 4-set +20%)\n    set_modifiers: List[Modifier] = field(default_factory=list)\n    set_bonus_name: str = \"\"\n\n    def get_all_modifiers(self) -> List[Modifier]:\n        all_mods = list(self.set_modifiers) # Start with set-wide bonuses\n        for piece in self.pieces.values():\n            all_mods.extend(piece.modifiers)\n        return all_mods\n\n    def get_modifier_sum(self, stat_type: StatType, mod_type: ModifierType) -> float:\n        return sum(mod.value for mod in self.get_all_modifiers() if mod.stat_type == stat_type and mod.mod_type == mod_type)\n\n@dataclass\nclass Arcana:\n    name: str\n    target_classes: List[str]\n    modifiers: List[Modifier] = field(default_factory=list)\n    arcana_type: str = \"\" # e.g., \"assassin\", \"rangerA\"\n\n    def get_modifier_sum(self, stat_type: StatType, mod_type: ModifierType) -> float:\n        return sum(mod.value for mod in self.modifiers if mod.stat_type == stat_type and mod.mod_type == mod_type)\n\n@dataclass\nclass Journey:\n    name: str\n    modifiers: List[Modifier] = field(default_factory=list)\n    journey_type: str = \"\" # e.g., \"AX\", \"GX\"\n    restrict: Dict[str, str] = field(default_factory=dict) # e.g., {\"char\": \"키라\"} or {\"class\": \"어쌔신\"}\n\n    def get_modifier_sum(self, stat_type: StatType, mod_type: ModifierType) -> float:\n        return sum(mod.value for mod in self.modifiers if mod.stat_type == stat_type and mod.mod_type == mod_type)\n\nclass Character:\n    def __init__(self, name: str, char_class: str, base_stats: Dict[StatType, float]):\n        self.name = name\n        self.char_class = char_class\n        self.base_stats = base_stats\n        self.permanent_modifiers: List[Modifier] = []\n        \n    def add_permanent_modifier(self, mod: Modifier):\n        self.permanent_modifiers.append(mod)\n        \n    def get_stat(self, stat_type: StatType, dynamic_modifiers: Optional[List[Modifier]] = None) -> float:\n        base = self.base_stats.get(stat_type, 0.0)\n        \n        flat_sum = 0.0\n        percent_sum = 0.0\n        multi_factor = 1.0\n        \n        all_mods = self.permanent_modifiers + (dynamic_modifiers or [])\n        \n        for mod in all_mods:\n            if mod.stat_type == stat_type:\n                if mod.mod_type == ModifierType.FLAT:\n                    flat_sum += mod.value\n                elif mod.mod_type == ModifierType.PERCENT:\n                    percent_sum += mod.value\n                elif mod.mod_type == ModifierType.MULTIPLICATIVE:\n                    multi_factor *= (1.0 + mod.value)\n        \n        # Standard formula: (Base * (1 + PercentSum) + FlatSum) * MultiFactor\n        # Note: In this specific game, ATK% usually applies to Base. \n        # But 'pool' calculation in calc_dps.py is a bit unique. \n        # pool = (Base_Atk + 1250) * (1 + Resonance%) + Resonance_Flat\n        # We might need to adjust this per stat.\n        \n        if stat_type == StatType.ATK or stat_type == StatType.DEF_PEN:\n            return (base * (1.0 + percent_sum) + flat_sum) * multi_factor\n        \n        return (base * (1.0 + percent_sum) + flat_sum) * multi_factor\n\n@dataclass\nclass Skill:\n    name: str\n    coeff: float\n    di: float = 0.0\n    cooldown: int = 1\n    is_ult: bool = False\n    is_basic: bool = False\n    hits: int = 1\n    extra_effects: Dict[str, Any] = field(default_factory=dict)\n", "Core/gear_sensitivity_v5.py": "from Core.models_v5 import StatType\nfrom typing import Dict, List, Callable\n\ndef profile_stat_scaling(\n    char_name: str, \n    cdata: Dict, \n    rdata: Dict, \n    equip_names: List[str], \n    stat_type: StatType, \n    max_increment: float, \n    step: float, \n    find_best_func: Callable,\n    base_vars: Dict = None\n) -> List[Dict]:\n    \"\"\"\n    특정 스탯(공격력, 치확, 치피)이 0%부터 max_increment까지 step 단위로 증가할 때,\n    각 구간별 절대적인 1위 빌드(장비+축복+여정)의 변화를 추적하여 반환합니다.\n    \"\"\"\n    var_map = {\n        StatType.ATK: \"$ATK$\", \n        StatType.CRIT_RATE: \"$CR$\", \n        StatType.CRIT_DAMAGE: \"$CD$\"\n    }\n    target_var = var_map.get(stat_type)\n    if not target_var:\n r\n- **특징**:\r\n    - **스킬 쿨다운 소모**: 정상적인 1턴으로 간주되어 모든 스킬의 쿨다운이 1턴 감소합니다.\r\n    - **시간 소모**: 정상적인 턴 속도에 따른 시간을 점유합니다.\r\n    - **표기**: 사이클 데이터에 `T1 -> T2`와 같이 연속된 번호로 표기됩니다.\r\n\r\n---\r\n\r\n> **업데이트 방법**: 새 캐릭터 추가 또는 수치 변경 시 해당 섹션만 수정.\r\n> 공식·시뮬 규칙은 `시뮬레이션_가이드라인_v6.md` 참조.\r\n> 로테이션 JSON은 `사이클_로테이션_마스터.md` 참조.\r\n\r\n---\r\n\r\n## 공통 가정 (모든 캐릭터 공통)\r\n\r\n| 항목 | 값 | 비고 |\r\n|------|-----|------|\r\n| 스텔라 아카이브 | +1,250 | 기본 공격력에 고정 가산 |\r\n| ⓑ (정수 합산) | 1,000 | 잠재력+호감도+전술분석+장비 정수 |\r\n| 장비 부옵 속도 | +60 | 고정 |\r\n| 장비 부옵 공격력% | +16.25% | ⓓ_정적 합산 |\r\n| 전술분석 공격력% | +1% | ⓓ_정적 합산 |\r\n| 힐데 ⓑ_체력 | 500 | 체력 부가 정수 근사값 |\r\n\r\n---\r\n\r\n## pool 계산 공식\r\n\r\n```\r\npool = (기본_공격력 + 1,250) × (1 + 공명_퍼센트) + 공명_정수\r\n```\r\n\r\n---\r\n\r\n## 분류별 사용 가능 아르카나\r\n\r\n| 분류 | 사용 가능 아르카나 (Journey) | 스택 및 특수 로직 (v14.0) |\r\n|------|----------------|--------------------------|\r\n| 스트라이커 | 공용 | 없음 |\r\n- **속성(격동) 시스템**: 모든 캐릭터는 기본기 사용 시 속성 +1 (최대 5).\r\n- **추가타(TN+)**: 행동 시간 0, 쿨타임 소모/갱신 없음. (예: 클레어 냉각 5회 시 특수기 추가타)\r\n- **추가턴(TN+1)**: 행동 시간 소모, 쿨타임 소모 발생. (예: 프레이 특수기)\r\n- **로자리아 업화 누적**: 기본기 사용 시 현재 **속성 스택 * 20%** 확률(기대값 정적 누적)로 업화 발생.\r\n- **클레어 냉각 5회**: 강화 평타가 아닌 **특수기(Extra Attack)** 발생.\r\n| 어쌔신 | 키라만큼 귀여워 | 매 행동 시작 시 속도 +10 (최대 3회) |\r\n| 캐스터 | 하늘의 심판 | 매 행동 시작 시 치피 +10% (최대 3회) |\r\n| 레인저 | 깊은 애도 | 기본기 사용 시 치확 +5% (최대 **5회**) |\r\n| 디펜더 | 스트라이커/어쌔신 호환 | - |\r\n| 오메가 | 허수의 개척자 | 특수기 사용 시 피증 +5% (최대 5회) |\r\n\r\n---\r\n\r\n---\r\n\r\n## 프레이 (캐스터 / 바니걸)\r\n\r\n### 기본 스탯\r\n\r\n| 항목 | 수치 | 비고 |\r\n|------|------|------|\r\n| 공격력 | 3,614 | |\r\n| 속도 | 90 | 장비 부옵 +60 → 최종 150 |\r\n| 치명타 확률 | 5% | |\r\n| 치명타 피해 | 68% | |\r\n| 공명 퍼센트 | 10% | |\r\n| 공명 정수 | 600 | |\r\n| **pool** | **(3614+1250)×1.10+600 = 5,800** | |\r\n\r\n### 패시브 (레벨별)\r\n\r\n| 레벨 | 공격력 보너스 | 달속성 HR 확률 | 시뮬 기준 |\r\n|------|-------------|--------------|---------|\r\n| 1레벨 | 0% | 50% | — |\r\n| 4레벨 | 15% | **100%** | ✅ **기본 적용** |\r\n> 자신을 제외한 달속성 아군이 타격 후 행동게이지 8% 증가, 100% 확률로 하이롤러(HR) 1회 발생. 최대 5회 중첩.\r\n\r\n> 패시   .char-body { display: none; padding: 24px; background: var(--bg2); }

  .strat-tab::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px; background: transparent; transition: all 0.2s; }
  .strat-tab.active-std { color: var(--blue); }
  .strat-tab.active-std::after { background: var(--blue); }
  .strat-tab.active-alt { color: var(--orange); }
  .strat-tab.active-alt::after { background: var(--orange); }
  .strat-tab:hover { color: var(--text); }

  .strat-panel { display: none; animation: fadeIn 0.3s ease-out; }

  .rank-num { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 800; width: 40px; }

  .rank-3 { color: var(--rank3); }

  .equip-tag { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 2px; background: var(--bg3); color: var(--text); border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
  .bless-tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 2px; background: rgba(230, 176, 30, 0.08); color: var(--gold); font-weight: 800; border: 1px solid rgba(230, 176, 30, 0.2); }

  .journey-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .j-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; background: rgba(0, 125, 187, 0.08); color: var(--blue-light); border: 1px solid rgba(0, 125, 187, 0.2); }

  .dps-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 800; color: #4CAF50; }
  .maxhit-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--gold); }

  .traj-section { margin-top: 12px; }
  .traj-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .traj-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .traj-stat { margin-bottom: 12px; }
  .traj-stat-name { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .traj-stat-name::before { content: ''; width: 3px; height: 12px; border-radius: 2px; background: var(--blue); display: inline-block; }
  .traj-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; background: var(--bg); margin-bottom: 3px; font-size: 12px; flex-wrap: wrap; }
  .pct-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--bg4); color: var(--text3); min-width: 48px; text-align: center; }
  .traj-equip { color: var(--text2); font-size: 11px; }
  .traj-dps { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--green); min-width: 50px; }
  .traj-maxhit { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--gold); min-width: 60px; }
  .traj-journeys { display: flex; flex-wrap: wrap; gap: 3px; flex: 1; }
  .tj { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: rgba(74,158,255,0.07); color: var(--blue); border: 1px solid rgba(74,158,255,0.15); }

  .peak-box { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255,87,87,0.05); border: 1px solid rgba(255,87,87,0.15); border-radius: 8px; margin-top: 8px; flex-wrap: wrap; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

<div class="search-wrap">

</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="custom-sim-wrap">

      </h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Savior</label>
          <select id="simCharBase" onchange="updateSimDropdowns('base')">
            <option value="">불러오는 중...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Passive / Special</label>
          <select id="simSpec" onchange="updateSimDropdowns('spec')">
            <option value="-">-</option>
          </select>
        </div>
        <div class="form-group" id="simPassiveWrap" style="display:none;">
           <label>Passive Level</label>
           <select id="simPassive">
             <option value="base">Max (Lv.4)</option>
             <option value="1lv">Base (Lv.1)</option>
           </select>
        </div>
        <div class="form-group">
          <label>Target Environment</label>
          <select id="simTarget">
            <option value="3">Normal Mode (3 Units)</option>
            <option value="1">Boss Mode (1 Unit)</option>
            <option value="4">Gauntlet Raid (4 Units)</option>

        </div>
        <div class="form-group">

      </div>
      <div class="form-grid" style="grid-template-columns: repeat(4, 1fr); margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px;">
        <div class="form-group">
          <label>ATK (%)</label>
          <input type="number" id="simAtk" value="0.0" step="0.1">
        </div>
        <div class="form-group">
          <label>Crit Rate (%)</label>
          <input type="number" id="simCr" value="0.0" step="0.1">
        </div>
        <div class="form-group">
          <label>Crit Dmg (%)</label>
          <input type="number" id="simCd" value="0.0" step="0.1">
        </div>
        <div class="form-group">
          <label>Speed</label>
          <input type="number" id="simSpd" value="0.0" step="0.1">
        </div>
      </div>
      <button class="sim-btn" id="simBtn" py-click="run_simulation" disabled>
        <span class="btn-text">Loading Engine...</span>
        <div class="loader" id="simLoader"></div>
      </button>
      <div id="simStatus" style="margin-top: 10px; font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; display: none; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;"></div>
      <div id="simResult" style="margin-top: 20px; display: none;"></div>
    </div>
    
    <!-- Existing Char Cards Container -->
    <div id="charContainer"></div>
  </main>
</div>

<script type="py">
import sys

# VFS Manual Injection (Bypass CORS for file:// protocol)
def setup_vfs():
    print("Initializing Virtual Filesystem...")
    vfs_script = document.getElementById("vfs-bundled")
    if not vfs_script:
        print("CRITICAL: VFS data not found in HTML!")
        return
    
    files = json.loads(vfs_script.innerHTML)
    for path, content in files.items():
        # Create directories if needed
        dirs = os.path.dirname(path)
        if dirs and not os.path.exists(dirs):
            os.makedirs(dirs, exist_ok=True)
            
        if content.startswith("BASE64:"):
            with open(path, "wb") as f:
                f.write(base64.b64decode(content[7:]))
        else:
            with open(path, "w", encoding="utf-8") as f:
                f.write(content)
        print(f"VFS Mount: {path} ({len(content)} bytes)")

setup_vfs()

# Setup Engine
import Core.calc_engine_v5 as calc_engine
from Core.data_loader_v5 import extract_json_from_md

# Load Data inside VFS
try:
    with open("Data/characters.json", "r", encoding="utf-8") as f:
        specs = json.load(f)
except:
    specs = extract_json_from_md("Data/캐릭터_스펙_마스터.md")

rotations = extract_json_from_md("Data/사이클_로테이션_마스터.md")

def log_status(msg, is_error=False):
    status_box = document.getElementById("simStatus")
    if not status_box: return
    status_box.style.display = "block"
    color = "var(--red)" if is_error else "var(--text2)"

    status_box.innerHTML = f"<span style='color:{color}'>[{now_str}] {msg}</span>"
    print(f"DEBUG: {msg}")

btn = document.getElementById("simBtn")
btn.querySelector(".btn-text").innerText = "시뮬레이션 실행"
btn.disabled = False
log_status("엔진 로드가 완료되었습니다. 준비 완료.")

async def run_simulation(e):
    try:
        log_status("사용자 클릭 감지 - 연산 시작 준비 중")
        btn = document.getElementById("simBtn")
        if btn: btn.disabled = True
        
        loader = document.getElementById("simLoader")
        if loader: loader.style.display = "block"
        
        btn_text = document.querySelector("#simBtn .btn-text")
        if btn_text: btn_text.innerText = "계산 중..."
        
        # Let UI update
        await asyncio.sleep(0.1)
        
        # Resolve selected character and parameters
        base_name = document.getElementById("simCharBase").value
        current_spec = document.getElementById("simSpec").value
        current_pass = document.getElementById("simPassive").value
        target_mode = int(document.getElementById("simTarget").value)
        
        log_status(f"선택 모델: {base_name} ({current_spec}, {current_pass}, {target_mode}인)")
        
        # Access global JS object correctly
        import js
        variants_tree = js.window.charVariants.to_py()
        char_node = variants_tree.get(base_name)
        
        if not char_node:
            raise ValueError("캐릭터 정보를 찾을 수 없습니다.")
            
        # Find the matching RAW key
        spec_list = char_node.get("specs", {}).get(current_spec, [])
        match = None
        for v in spec_list:
            if v['lv'] == current_pass:
                # If target is filtered, we need to match it or use 'both'
                if v['target'] == 'both' or v['target'] == str(target_mode):
                    match = v['raw']
                    break
        
        if not match:
            # Fallback to the first available in this spec if no exact match
            if spec_list: match = spec_list[0]['raw']
            else: raise ValueError("해당 조합의 데이터를 찾을 수 없습니다.")
            
        char_name = match
        log_status(f"데이터베이스 조회 키: {char_name}")
            
        cdata = specs.get(char_name)
        if not cdata:
            # Fallback 1: Try stripping common environment/passive safe IDs
            fallback_name = char_name.replace("-보스1인", "").replace("-일반3인", "")
            cdata = specs.get(fallback_name)
            if not cdata:
                # Fallback 2: Try mapping back to original keys from characters.json
                # (Simple contains check as a last resort)
                for k in specs.keys():
                    if k in char_name or char_name in k:
                        cdata = specs[k]
                        char_name = k # Use the one found
                        break
            else:
                char_name = fallback_name

        rdata = rotations.get(char_name) or rotations.get(char_name.replace("-보스1인", "").replace("-일반3인", ""))
        
        if not cdata or not rdata:
            raise ValueError(f"캐릭터 '{char_name}'에 대한 핵심 데이터(스펙/로테이션)가 누락되었습니다.")
            
        char_class = cdata.get("분류", cdata.get("class", "Unknown"))
        target_count = target_mode
        
        log_status(f"엔진 분석 시작 (타겟 수: {target_count}, 클래스: {char_class})")

        # Get Substats (divided by 6 to distribute across 6 equipment slots)
        sim_vars = {
            "$ATK$": (float(document.getElementById("simAtk").value) / 100.0) / 6.0,
            "$CR$": (float(document.getElementById("simCr").value) / 100.0) / 6.0,
            "$CD$": (float(document.getElementById("simCd").value) / 100.0) / 6.0,
            "$SPD$": float(document.getElementById("simSpd").value) / 6.0
        }
        
        log_status("장비 바인딩 및 서브스탯 적용 중...")
        calc_engine.EQUIPMENTS = calc_engine.setup_equipments(sim_vars)
        
        sim_turns = int(document.getElementById("simTurns").value)
        metric_label = "Total Dmg" if sim_turns <= 5 else "DPS"
        
        html_out = f"<h3>[AX 특화 베스트 결과] <span style='font-size:12px; color:var(--text3); font-weight:normal;'>({sim_turns}턴 최적화)</span></h3><table class='rank-table'><thead><tr><th>장비</th><th>{metric_label}</th><th>MaxHit</th><th>ATK</th><th>CR</th><th>CD</th><th>SPD</th><th>여정</th></tr></thead><tbody>"
        
        # Test just the top equipment sets to save time
        eq_names = list(calc_engine.EQUIPMENTS.keys())
        best_results = []
        log_status(f"조합 탐색 시작 (전체 {len(eq_names)}개 세트 스캔)...")
        
        # Detect Moon Party environment explicitly from UI
        current_spec = document.getElementById('simSpec').value
        force_moon_party = (current_spec == '달속성 파티')
        
        for i, eq_name in enumerate(eq_names):
            if i % 2 == 0:
                log_status(f"연산 진행 중... ({i+1}/{len(eq_names)})")
                await asyncio.sleep(0.01)
                
            # Lazy Re-init check
            if not calc_engine.JOURNEYS or "Error" in calc_engine.JOURNEYS:
                log_status("데이버 베이스 재연결 시도 중...", False)
                calc_engine.JOURNEYS = calc_engine.setup_journeys()
                calc_engine.BLESSINGS = calc_engine.setup_blessings()

            res = calc_engine.find_best_journeys(char_name, char_class, cdata, rdata, eq_name, 5, (sim_turns <= 5), sim_vars, target_count, force_moon_party=force_moon_party, max_actions=sim_turns)
            # Standard contains the best for that turn count
            std_jrs, std_bless, _, _, _ = res["standard"]
            
            # Re-run for the specific turn count to get correct final metrics (redundant but safe)
            dps_final, total_final, _, _, std_max, std_stats = calc_engine.calculate_dps(char_name, cdata, rdata, eq_name, std_jrs, std_bless, sim_turns, False, target_count=target_count, force_moon_party=force_moon_party)
            std_val = total_final if sim_turns <= 5 else dps_final
            
            best_results.append((eq_name, std_bless, std_val, std_max, std_jrs, std_stats))
            
        best_results.sort(key=lambda x: x[2], reverse=True)
        log_status("연산 완료! 결과 렌더링 중...")
        
        for eq, bl, dps, mh, jrs, stats in best_results[:3]:

                jr_html += "<span class='j-tag'>" + j + "</span>"
            
            # Formatting stats
            f_atk = f"{stats.get('atk', 0):,.0f}"
            f_cr = f"{stats.get('cr', 0)*100:4.1f}%"
            f_cd = f"{stats.get('cd', 0)*100:4.1f}%"

            html_out += f"<tr><td><span class='equip-tag'>{eq}</span></td><td><span class='dps-val'>{dps:,.2f}</span></td><td><span class='maxhit-val'>{mh:,.0f}</span></td><td>{f_atk}</td><td>{f_cr}</td><td>{f_cd}</td><td>{f_spd}</td><td><div class='journey-list'>{jr_html}</div></td></tr>"
            
        html_out += "</tbody></table>"

    except Exception as ex:
        log_status(f"CRITICAL ERROR: {str(ex)}", is_error=True)
        document.getElementById("simResult").innerHTML = f"<div style='color:red;'>오류 발생: {str(ex)}</div>"
        document.getElementById("simResult").style.display = "block"
        
    if btn: btn.disabled = False
    loader = document.getElementById("simLoader")
    if loader: loader.style.display = "none"
    btn_text = document.querySelector("#simBtn .btn-text")
    if btn_text: btn_text.innerText = "시뮬레이션 실행"
